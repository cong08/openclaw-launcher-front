<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw Launcher</title>
  <meta name="description" content="One-click OpenClaw launcher. Auto-detect environment and download the right build." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-layer" aria-hidden="true"></div>
  <header class="topbar">
    <div class="brand">
      <span class="brand-badge"></span>
      OpenClaw
    </div>
  </header>

  <main class="hero">
    <section class="hero-left">
      <h1>The Fastest Way to Run OpenClaw</h1>
    </section>

    <section class="hero-right">
      <div id="downloads" class="actions">
        <a id="download-arm64" class="btn-primary" href="#" target="_blank" rel="noopener noreferrer">
          <span class="apple-mark"></span>
          <span class="btn-copy">
            <strong>Download for Apple Silicon</strong>
            <small>arm64 · M1 / M2 / M3 / M4</small>
          </span>
        </a>
        <a id="download-x64" class="btn-primary" href="#" target="_blank" rel="noopener noreferrer">
          <span class="apple-mark"></span>
          <span class="btn-copy">
            <strong>Download for Intel Mac</strong>
            <small>x64 · Intel processors</small>
          </span>
        </a>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
